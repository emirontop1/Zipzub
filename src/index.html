<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="Xenon Maps - Ücretsiz ve açık kaynaklı harita uygulaması">
    <title>Xenon Maps - Özgür Harita</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
          integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
          crossorigin=""/>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
          integrity="sha512-DTOQO9RWCH3ppGqcWaEA1BIZOC6xxalwEsw9c2QQeAIftl+Vegovlnee1c9QX4TctnWMn13TZye+giMm8e2LwA=="
          crossorigin="anonymous" referrerpolicy="no-referrer"/>
    
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div id="xenon-loader">
        <div class="loader-content">
            <div class="xenon-spinner"></div>
            <h1 class="loader-title">Xenon Maps</h1>
            <p class="loader-text">Harita yükleniyor...</p>
        </div>
    </div>

    <div id="xenon-app" class="hidden">
        <header class="xenon-header">
            <div class="header-left">
                <i class="fas fa-globe-americas logo-icon"></i>
                <h1 class="header-title">Xenon <span>Maps</span></h1>
            </div>
            
            <div class="search-container">
                <div class="search-box">
                    <i class="fas fa-search search-icon"></i>
                    <input type="text" id="searchInput" 
                           placeholder="Konum ara... (Örn: İstanbul, Paris)"
                           autocomplete="off">
                    <button id="searchButton" title="Ara">
                        <i class="fas fa-arrow-right"></i>
                    </button>
                    <button id="clearSearch" class="hidden" title="Temizle">
                        <i class="fas fa-times"></i>
                    </button>
                </div>
                <div id="searchResults" class="search-results hidden"></div>
            </div>
            
            <div class="header-actions">
                <button id="locateBtn" class="action-btn" title="Konumumu bul">
                    <i class="fas fa-location-crosshairs"></i>
                </button>
                <button id="shareBtn" class="action-btn" title="Konumu paylaş">
                    <i class="fas fa-share-nodes"></i>
                </button>
                <button id="themeToggle" class="action-btn" title="Tema değiştir">
                    <i class="fas fa-moon"></i>
                </button>
                <button id="infoBtn" class="action-btn" title="Hakkında">
                    <i class="fas fa-info-circle"></i>
                </button>
            </div>
        </header>
        
        <div id="map"></div>
        
        <div id="mapInfo" class="map-info">
            <span id="coordinates">39.9334° N, 32.8597° E</span>
            <span class="separator">|</span>
            <span id="zoomLevel">Yakınlaştırma: 13</span>
        </div>
        
        <div id="contextMenu" class="context-menu hidden">
            <div class="menu-item" data-action="center">
                <i class="fas fa-crosshairs"></i> Burayı Ortala
            </div>
            <div class="menu-item" data-action="measure">
                <i class="fas fa-ruler"></i> Mesafe Ölç
            </div>
            <div class="menu-item" data-action="copy-coords">
                <i class="fas fa-copy"></i> Koordinatları Kopyala
            </div>
            <div class="menu-item" data-action="whatshere">
                <i class="fas fa-map-pin"></i> Burası Neresi?
            </div>
        </div>
        
        <div id="measureInfo" class="measure-info hidden">
            <i class="fas fa-ruler-combined"></i>
            <span id="measureDistance">0 km</span>
            <button id="clearMeasure" title="Ölçümü temizle">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <div id="notification" class="notification hidden"></div>
    </div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
            integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
            crossorigin=""></script>
    
    <!-- Offline harita yapılandırması -->
    <script src="js/map.js"></script>
    
    <!-- Ana uygulama -->
    <script src="js/app.js"></script>
</body>
</html>
